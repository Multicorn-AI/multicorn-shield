<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Multicorn Consent Component - Vanilla HTML Example</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 0;
        padding: 20px;
        background: #0d0d14;
        color: #e8e8f0;
        min-height: 100vh;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
      }

      h1 {
        text-align: center;
        margin-bottom: 40px;
      }

      .examples {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 40px;
        margin-top: 40px;
      }

      @media (max-width: 768px) {
        .examples {
          grid-template-columns: 1fr;
        }
      }

      .example-section {
        background: #14141f;
        padding: 24px;
        border-radius: 12px;
        border: 1px solid #2a2a3d;
      }

      .example-section h2 {
        margin-top: 0;
        font-size: 18px;
        color: #8b5cf6;
      }

      .controls {
        margin-top: 20px;
        padding: 16px;
        background: #1a1a2e;
        border-radius: 8px;
        border: 1px solid #2a2a3d;
      }

      .controls button {
        background: #8b5cf6;
        color: white;
        border: none;
        padding: 8px 16px;
        border-radius: 6px;
        cursor: pointer;
        margin-right: 8px;
        margin-bottom: 8px;
        font-family: inherit;
      }

      .controls button:hover {
        background: #7c3aed;
      }

      .event-log {
        margin-top: 20px;
        padding: 16px;
        background: #1a1a2e;
        border-radius: 8px;
        border: 1px solid #2a2a3d;
        max-height: 200px;
        overflow-y: auto;
        font-family: "Courier New", monospace;
        font-size: 12px;
      }

      .event-log .event {
        margin-bottom: 8px;
        padding: 8px;
        background: #0d0d14;
        border-radius: 4px;
        border-left: 3px solid #8b5cf6;
      }

      .event-log .event.granted {
        border-left-color: #22c55e;
      }

      .event-log .event.denied {
        border-left-color: #ef4444;
      }

      .event-log .event.partial {
        border-left-color: #f59e0b;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Multicorn Consent Component Examples</h1>

      <div class="examples">
        <!-- Modal Mode Example -->
        <div class="example-section">
          <h2>Modal Mode (Default)</h2>
          <p>Click the button below to open the consent screen as a modal overlay.</p>
          <div class="controls">
            <button id="open-modal">Open Modal Consent</button>
          </div>
          <div class="event-log" id="modal-events">
            <div style="color: #8888a0; font-style: italic">No events yet...</div>
          </div>
        </div>

        <!-- Inline Mode Example -->
        <div class="example-section">
          <h2>Inline Mode</h2>
          <p>The consent screen embedded directly in the page.</p>
          <multicorn-consent
            id="inline-consent"
            agent-name="Code Assistant"
            agent-color="#06b6d4"
            mode="inline"
            scopes='[{"service":"gmail","permissionLevel":"read"},{"service":"calendar","permissionLevel":"write"},{"service":"github","permissionLevel":"read"}]'
            spend-limit="100"
          ></multicorn-consent>
          <div class="event-log" id="inline-events">
            <div style="color: #8888a0; font-style: italic">No events yet...</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Modal consent element (created dynamically) -->
    <multicorn-consent
      id="modal-consent"
      agent-name="Email Assistant"
      agent-color="#8b5cf6"
      mode="modal"
      scopes='[{"service":"gmail","permissionLevel":"read"},{"service":"gmail","permissionLevel":"write"},{"service":"calendar","permissionLevel":"read"},{"service":"payments","permissionLevel":"execute"}]'
      spend-limit="200"
      style="display: none"
    ></multicorn-consent>

    <script type="module">
      // Import the consent component
      // Note: In production, import from the built dist folder
      // import "multicorn-shield/consent";
      // For development, we'll use a CDN or build setup
      // This example assumes the component is available globally after build

      // Modal example
      const modalConsent = document.getElementById("modal-consent");
      const openModalBtn = document.getElementById("open-modal");
      const modalEvents = document.getElementById("modal-events");

      function logEvent(element, eventName, detail) {
        const eventDiv = document.createElement("div");
        eventDiv.className = `event ${eventName.replace("consent-", "")}`;
        eventDiv.innerHTML = `
          <strong>${eventName}</strong><br/>
          <span style="color: #8888a0">Time:</span> ${new Date(detail.timestamp).toLocaleTimeString()}<br/>
          ${detail.grantedScopes ? `<span style="color: #8888a0">Granted:</span> ${detail.grantedScopes.length} scope(s)<br/>` : ""}
          ${detail.deniedScopes ? `<span style="color: #8888a0">Denied:</span> ${detail.deniedScopes.length} scope(s)<br/>` : ""}
        `;
        element.appendChild(eventDiv);
        element.scrollTop = element.scrollHeight;
      }

      openModalBtn.addEventListener("click", () => {
        modalConsent.style.display = "block";
        modalEvents.innerHTML = ""; // Clear previous events
      });

      modalConsent.addEventListener("consent-granted", (e) => {
        logEvent(modalEvents, "consent-granted", e.detail);
        modalConsent.style.display = "none";
      });

      modalConsent.addEventListener("consent-partial", (e) => {
        logEvent(modalEvents, "consent-partial", e.detail);
        modalConsent.style.display = "none";
      });

      modalConsent.addEventListener("consent-denied", (e) => {
        logEvent(modalEvents, "consent-denied", e.detail);
        modalConsent.style.display = "none";
      });

      // Inline example
      const inlineConsent = document.getElementById("inline-consent");
      const inlineEvents = document.getElementById("inline-events");

      inlineConsent.addEventListener("consent-granted", (e) => {
        logEvent(inlineEvents, "consent-granted", e.detail);
      });

      inlineConsent.addEventListener("consent-partial", (e) => {
        logEvent(inlineEvents, "consent-partial", e.detail);
      });

      inlineConsent.addEventListener("consent-denied", (e) => {
        logEvent(inlineEvents, "consent-denied", e.detail);
      });
    </script>
  </body>
</html>
