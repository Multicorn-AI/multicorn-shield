name: publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Prepare npm for OIDC
        run: |
          echo "npm $(npm --version) / node $(node --version)"
          npm config delete //registry.npmjs.org/:_authToken 2>/dev/null || true
          echo "--- npm config ---"
          npm config list
          echo "--- .npmrc files ---"
          cat ~/.npmrc 2>/dev/null || echo "no ~/.npmrc"
          cat .npmrc 2>/dev/null || echo "no ./.npmrc"
          find /home/runner -name .npmrc 2>/dev/null || true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        run: 'npm version ${{ inputs.version }} -m "chore(release): v%s"'

      - name: Publish to npm
        run: npm publish --access public --provenance

      - name: Push version commit and tag
        run: git push --follow-tags

      - name: Trigger multicorn-learn rebuild
        run: |
          curl -s -X POST "${{ secrets.VERCEL_LEARN_DEPLOY_HOOK }}"
