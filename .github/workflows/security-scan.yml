name: Security Scan

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  pnpm-audit:
    name: pnpm audit (production)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit
        id: audit
        run: pnpm audit --prod --audit-level=high 2>&1 | tee audit-output.txt

      - name: Open issue on findings
        if: failure() && steps.audit.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const titlePrefix = 'pnpm audit:';
            const auditPath = path.join(process.env.GITHUB_WORKSPACE, 'audit-output.txt');
            let auditBody = '';
            try {
              auditBody = fs.readFileSync(auditPath, 'utf8');
            } catch (e) {
              auditBody = '(Could not read audit output file.)';
            }
            const maxLen = 60000;
            const trimmed = auditBody.length > maxLen ? auditBody.slice(0, maxLen) + '\n\n...(truncated)' : auditBody;

            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });

            const duplicate = openIssues.find((i) => i.title.startsWith(titlePrefix));

            const body = `Weekly \`pnpm audit --prod --audit-level=high\` failed.\n\n**Workflow run:** ${runUrl}\n\n\`\`\`\n${trimmed}\n\`\`\``;

            if (duplicate) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: duplicate.number,
                body: `Weekly scan still failing.\n\n**Workflow run:** ${runUrl}\n\n\`\`\`\n${trimmed}\n\`\`\``,
              });
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'pnpm audit: high-severity vulnerabilities found',
              body,
            });
