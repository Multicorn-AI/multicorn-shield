name: Publish Python SDK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (must match pyproject.toml)'
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Verify version matches
        run: |
          TOML_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$TOML_VERSION" != "${{ inputs.version }}" ]; then
            echo "::error::Version mismatch: pyproject.toml has $TOML_VERSION, input was ${{ inputs.version }}"
            exit 1
          fi

      - name: Install build tools
        run: pip install build twine

      - name: Build
        run: python -m build

      - name: Check
        run: twine check dist/*

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*
