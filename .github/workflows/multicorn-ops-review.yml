name: multicorn-ops review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: multicorn-ops-${{ github.repository }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  persona-review:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Run multicorn-ops review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MULTICORN_SHIELD_API_KEY: ${{ secrets.MULTICORN_SHIELD_API_KEY }}
          SHIELD_API_URL: ${{ secrets.SHIELD_API_URL }}
          REPO_NAME: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          IS_PUBLIC_REPO: "true"
          ANTHROPIC_MODEL: claude-sonnet-4-6
        run: node scripts/multicorn-ops/index.cjs
