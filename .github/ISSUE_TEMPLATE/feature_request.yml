name: Feature Request
description: Suggest a new feature or improvement for multicorn-shield
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature! Please describe the problem and your proposed solution.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? Describe the use case.
      placeholder: "When I try to … I can't … because …"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe how you'd like this feature to work. Include API examples if relevant.
      placeholder: |
        ```typescript
        import { newFeature } from "multicorn-shield";

        const result = newFeature({ ... });
        ```
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative approaches or workarounds?

  - type: dropdown
    id: scope
    attributes:
      label: Which area does this affect?
      options:
        - Consent screen
        - Scope validation
        - Action logging
        - Spending controls
        - TypeScript types / DX
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, mockups, or references that help explain the feature.
